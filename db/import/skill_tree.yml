###########################################################################
# Custom skill tree override (auto-imported after db/<re|pre-re>/skill_tree.yml)
#
# HOKAGE = the Kagerou (male, 4211) / Oboro (female, 4212) job, repurposed.
# Both are already Ninja-lineage (MAPID_KAGEROUOBORO = JOBL_2_1|MAPID_NINJA)
# and already Inherit: Ninja, so the Ninja jutsu come for free.
#
# This override MERGES into the base Kagerou/Oboro entries and:
#   1. STRIPS every native Kagerou (KO_*/KG_*) and Oboro (KO_*/OB_*) skill by
#      setting MaxLevel: 0 (the parser removes MaxLevel-0 skills on merge).
#   2. ADDS the 12 custom HOK_* jutsu.
# Net tree per job: full Ninja set (inherited) + HOK_* customs. No KO_/KG_/OB_.
#
# Applies in BOTH renewal and pre-re (import has no Mode tag). Zeroing a skill
# that doesn't exist in a given mode's base tree is a harmless no-op.
#
# NECROMANCER = custom job 4435 (JOB_NECROMANCER / MAPID_NECROMANCER), an
# Acolyte-lineage class. Its tree is created here - there is no base entry to
# merge with. Every current and future NEC_* skill goes in the one Tree block
# below; nothing else needs touching to add one.
###########################################################################

Header:
  Type: SKILL_TREE_DB
  Version: 1

Body:
  #########################################################################
  # KAGEROU (male) - Hokage
  #########################################################################
  - Job: Kagerou
    Inherit:
      Ninja: true          # keep full Ninja skill set
    Tree:
      # --- strip native Kagerou skills (KO_* / KG_*) ---
      - { Name: KO_YAMIKUMO,     MaxLevel: 0 }
      - { Name: KO_RIGHT,        MaxLevel: 0 }
      - { Name: KO_LEFT,         MaxLevel: 0 }
      - { Name: KO_JYUMONJIKIRI, MaxLevel: 0 }
      - { Name: KO_SETSUDAN,     MaxLevel: 0 }
      - { Name: KO_BAKURETSU,    MaxLevel: 0 }
      - { Name: KO_HAPPOKUNAI,   MaxLevel: 0 }
      - { Name: KO_MUCHANAGE,    MaxLevel: 0 }
      - { Name: KO_HUUMARANKA,   MaxLevel: 0 }
      - { Name: KO_MAKIBISHI,    MaxLevel: 0 }
      - { Name: KO_MEIKYOUSISUI, MaxLevel: 0 }
      - { Name: KO_ZANZOU,       MaxLevel: 0 }
      - { Name: KO_KYOUGAKU,     MaxLevel: 0 }
      - { Name: KO_JYUSATSU,     MaxLevel: 0 }
      - { Name: KO_KAHU_ENTEN,   MaxLevel: 0 }
      - { Name: KO_HYOUHU_HUBUKI, MaxLevel: 0 }
      - { Name: KO_KAZEHU_SEIRAN, MaxLevel: 0 }
      - { Name: KO_DOHU_KOUKAI,  MaxLevel: 0 }
      - { Name: KO_KAIHOU,       MaxLevel: 0 }
      - { Name: KO_ZENKAI,       MaxLevel: 0 }
      - { Name: KO_GENWAKU,      MaxLevel: 0 }
      - { Name: KO_IZAYOI,       MaxLevel: 0 }
      - { Name: KG_KAGEHUMI,     MaxLevel: 0 }
      - { Name: KG_KYOMU,        MaxLevel: 0 }
      - { Name: KG_KAGEMUSYA,    MaxLevel: 0 }
      # --- Hokage custom jutsu ---
      - Name: HOK_KAGEBUNSHIN       # Kage Bunshin no Jutsu (7001)
        MaxLevel: 10
      - Name: HOK_TAJUU_KAGEBUNSHIN # Tajuu Kage Bunshin no Jutsu (7002)
        MaxLevel: 10
        Requires:
          - Name: HOK_KAGEBUNSHIN
            Level: 10
      - Name: HOK_GYAKU_KUCHIYOSE   # Gyaku Kuchiyose - dispel clones (7003)
        MaxLevel: 1
      - Name: HOK_DAICHI_HASAI      # Daichi Hasai no Jutsu - earthquake (7004)
        MaxLevel: 10
      - Name: HOK_JINTON            # Jinton no Jutsu - flee/speed buff (7005)
        MaxLevel: 5
      - Name: HOK_SENNIN_MODE       # Sennin Mode - triple ATK buff (7006)
        MaxLevel: 5
      - Name: HOK_RASENGAN          # Rasengan - 10% max HP dmg/level (7007)
        MaxLevel: 5
      - Name: HOK_MUON_SATSUJIN     # Muon Satsujin - never-miss melee ATK (7008)
        MaxLevel: 5
      - Name: HOK_SHINRA_TENSEI     # Shinra Tensei - AoE knockback (7009)
        MaxLevel: 5
      - Name: HOK_FUUJUTSU_KYUUIN   # Fuujutsu Kyuuin - +100 armor DEF buff (7010)
        MaxLevel: 10
      - Name: HOK_NARAKUMI          # Narakumi - Confusion + Hallucination (7011)
        MaxLevel: 1
      - Name: HOK_SENSATSU_SUISHOU  # Sensatsu Suishou - 1% current HP/lv AoE (7012)
        MaxLevel: 10

  #########################################################################
  # NECROMANCER (job 4435) - custom Acolyte-lineage summoner.
  #
  # Add future NEC_* skills to this Tree. Nothing else is job-specific:
  # the skill only needs an entry in db/import/skill_db.yml and, if it has
  # behavior, a case in skill_castend_nodamage_id().
  #########################################################################
  - Job: Necromancer
    Inherit:
      Acolyte: true               # full Acolyte skill set
    Tree:
      - Name: NEC_RAISE_INFERNO       # Raise Inferno - summons Ifrit (7013)
        MaxLevel: 1
      - Name: NEC_BLIZZARD_WRATH      # Blizzard's Wrath - summons Ktullanux (7014)
        MaxLevel: 1
      - Name: NEC_VORTEX_GRASP        # Vortex Grasp - summons Gryphon (7015)
        MaxLevel: 1
      - Name: NEC_DEMON_AGONY         # Demon's Agony - summons Thanatos Phantom (7016)
        MaxLevel: 1
      - Name: NEC_SACRED_SOUL_VOODOO  # Sacred Soul Voodoo - summons Randgris (7017)
        MaxLevel: 1
      - Name: NEC_CHAOS_BONDS         # Chaos Bonds - summons Orc Lord (7018)
        MaxLevel: 1
      - Name: NEC_REVERSE_CONTRACT    # Reverse Contract - dispels the companion (7019)
        MaxLevel: 1

  #########################################################################
  # OBORO (female) - Hokage
  #########################################################################
  - Job: Oboro
    Inherit:
      Ninja: true          # keep full Ninja skill set
    Tree:
      # --- strip native Oboro skills (KO_* / OB_*) ---
      - { Name: KO_YAMIKUMO,     MaxLevel: 0 }
