###########################################################################
# Custom skill tree override (auto-imported after db/<re|pre-re>/skill_tree.yml)
#
# Hokage (job 4300 = JOB_HOKAGE, a fresh Ninja-lineage job).
# This creates the Hokage skill tree (no base entry exists for it), so:
#   - Novice: false  is a harmless no-op here.
#   - Ninja / Kagerou: true  pull in the full Ninja + Kagerou skill sets,
#     making Hokage play as an advanced Ninja.
#
# Inheritance only copies skills defined in that job's own Tree (not what it
# inherits), so we list both Ninja and Kagerou to get the complete kit.
# Add entries under Tree: below to grant extra/custom skills.
###########################################################################

Header:
  Type: SKILL_TREE_DB
  Version: 1

Body:
  - Job: Hokage
    Inherit:
      Novice: false      # no-op for the fresh Hokage job (no base entry to override)
      Ninja: true        # full Ninja skill set
      Kagerou: false      # Kagerou/Oboro (KO_*) advanced skills
    Tree:
      # Hokage-exclusive custom skills
      - Name: HOK_KAGEBUNSHIN   # Kage Bunshin no Jutsu (id 7001)
        MaxLevel: 10
      - Name: HOK_TAJUU_KAGEBUNSHIN # Tajuu Kage Bunshin no Jutsu (id 7002)
        MaxLevel: 10
        Requires:
          - Name: HOK_KAGEBUNSHIN   # advanced form - master Kage Bunshin first
            Level: 10
      - Name: HOK_GYAKU_KUCHIYOSE  # Gyaku Kuchiyose - dispel clones (id 7003)
        MaxLevel: 1
      - Name: HOK_DAICHI_HASAI     # Daichi Hasai no Jutsu - earthquake (id 7004)
        MaxLevel: 10
      - Name: HOK_JINTON           # Jinton no Jutsu - flee/speed buff (id 7005)
        MaxLevel: 5
      - Name: HOK_SENNIN_MODE      # Sennin Mode / Sage Mode - triple ATK buff (id 7006)
        MaxLevel: 5
      - Name: HOK_RASENGAN         # Rasengan - 10% max HP dmg/level, Misc (id 7007)
        MaxLevel: 5
      - Name: HOK_MUON_SATSUJIN    # Muon Satsujin no Jutsu - never-miss melee ATK (id 7008)
        MaxLevel: 5
      - Name: HOK_SHINRA_TENSEI    # Shinra Tensei / Almighty Push - AoE knockback (id 7009)
        MaxLevel: 5
      - Name: HOK_FUUJUTSU_KYUUIN   # Fuujutsu Kyuuin - +100 armor DEF self buff (id 7010)
        MaxLevel: 10
      - Name: HOK_NARAKUMI          # Narakumi no Jutsu - Confusion + Hallucination (id 7011)
        MaxLevel: 1
      - Name: HOK_SENSATSU_SUISHOU  # Sensatsu Suishou - 1% current HP/level AoE (id 7012)
        MaxLevel: 10
