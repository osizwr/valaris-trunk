###########################################################################
# Custom skill definitions (auto-imported after db/<re|pre-re>/skill_db.yml)
#
# Kage Bunshin no Jutsu - custom Hokage skill (id 7001, constant HOK_KAGEBUNSHIN).
# Data only; the summon behavior is implemented in src/map/skill.cpp
# (skill_castend_nodamage_id -> case HOK_KAGEBUNSHIN) and requires a recompile.
#
# Duration1 below is used as the clone lifespan (skill_get_time) in the C++ code.
#
# NOTE: per-level fields (CastTime/Cooldown/SpCost/...) MUST list EVERY level.
# The parser only extrapolates BEYOND the highest level given; gaps between two
# sparse levels (e.g. only Level 1 + Level 10) are left at 0 - which would make
# the in-between levels cast instantly / cost no SP. Single-level entries are
# fine (they fill all levels with that one value).
###########################################################################

