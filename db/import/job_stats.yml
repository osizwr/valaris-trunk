###########################################################################
# Custom job override (auto-imported after db/<re|pre-re>/job_stats.yml).
#
# ALL custom job data lives in this single Body (stats, ASPD and exp all use
# the same JOB_STATS parser). Do NOT add a Footer with Imports here: this file
# is itself loaded as an import, and a nested import would reset the shared
# parser state mid-load and crash the map-server.
#
#  - Hokage (job 4051 = Death_Knight): stats + ASPD  [vestigial - class now on Kagerou/Oboro]
#  - Transcendent line: Base 255 / Job 120 exp tables
###########################################################################

Header:
  Type: JOB_STATS
  Version: 4

Body:
  # Hokage - custom class on job 4051 (Death_Knight). Stats + ASPD together so
  # the ASPD vector is sized and filled during the job's creation.
